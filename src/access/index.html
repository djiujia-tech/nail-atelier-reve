<!doctype html>
<html lang="ja">
  {{> head }}
  <body>
    {{> p-intro}}
    {{> p-header}}
    <main>
      <div class="p-page-hero">
        <p class="p-page-hero__en">ACCESS</p>
        <h1 class="p-page-hero__title">アクセス</h1>
      </div>

      <section class="p-access l-section">
        <div class="l-inner">
          <div class="p-access__body">
            <div class="p-access__info">
              <dl class="p-access__dl">
                <div class="p-access__row">
                  <dt>サロン名</dt>
                  <dd>Nail Atelier RÊVE（ネイルアトリエ レーヴ）</dd>
                </div>
                <div class="p-access__row">
                  <dt>住所</dt>
                  <dd>〒000-0000<br>○○県○○市中央1-1-1 ○○ビル2F</dd>
                </div>
                <div class="p-access__row">
                  <dt>TEL</dt>
                  <dd>000-0000-0000</dd>
                </div>
                <div class="p-access__row">
                  <dt>営業時間</dt>
                  <dd>10:00〜19:00（最終受付 18:00）</dd>
                </div>
                <div class="p-access__row">
                  <dt>定休日</dt>
                  <dd>毎週火曜日</dd>
                </div>
                <div class="p-access__row">
                  <dt>アクセス</dt>
                  <dd>○○駅より徒歩5分</dd>
                </div>
                <div class="p-access__row">
                  <dt>駐車場</dt>
                  <dd>近隣コインパーキングをご利用ください</dd>
                </div>
              </dl>
              <div class="u-text-center">
                <a href="/contact/" class="c-btn">ご予約・お問い合わせ</a>
              </div>
            </div>
            <div class="p-access__map">
              <iframe
                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3240.6!2d139.6917!3d35.6895!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0!2z!5e0!3m2!1sja!2sjp!4v1"
                width="100%"
                height="450"
                style="border:0"
                allowfullscreen=""
                loading="lazy"
              ></iframe>
            </div>
          </div>
        </div>
      </section>
    </main>
    {{> p-footer}}
  </body>
</html>
