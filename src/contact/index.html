<!doctype html>
<html lang="ja">
  {{> head }}
  <body>
    {{> p-intro}}
    {{> p-header}}
    <main>
      <div class="p-page-hero">
        <p class="p-page-hero__en">CONTACT</p>
        <h1 class="p-page-hero__title">ご予約・お問い合わせ</h1>
      </div>

      <section class="p-contact l-section">
        <div class="l-inner">
          <p class="p-contact__lead js-fade">
            ご予約・ネイルチップのご注文・その他お問い合わせは<br>
            下記フォームよりお気軽にどうぞ。<br>
            通常2営業日以内にご返信いたします。
          </p>

          <form action="#" class="p-contact__form js-fade" data-delay="1" novalidate>
            <div class="p-contact__field">
              <label for="name" class="p-contact__label">
                お名前<span class="p-contact__required">必須</span>
              </label>
              <input
                type="text"
                id="name"
                name="name"
                class="p-contact__input"
                placeholder="例：山田 花子"
                required
              />
            </div>

            <div class="p-contact__field">
              <label for="email" class="p-contact__label">
                メールアドレス<span class="p-contact__required">必須</span>
              </label>
              <input
                type="email"
                id="email"
                name="email"
                class="p-contact__input"
                placeholder="例：example@example.com"
                required
              />
            </div>

            <div class="p-contact__field">
              <label for="tel" class="p-contact__label">電話番号</label>
              <input
                type="tel"
                id="tel"
                name="tel"
                class="p-contact__input"
                placeholder="例：090-1234-5678"
              />
            </div>

            <div class="p-contact__field">
              <p class="p-contact__label">
                お問い合わせ種別<span class="p-contact__required">必須</span>
              </p>
              <div class="p-contact__radio-group">
                <label class="p-contact__radio">
                  <input type="radio" name="type" value="reservation" required />
                  <span>ご予約について</span>
                </label>
                <label class="p-contact__radio">
                  <input type="radio" name="type" value="shop" />
                  <span>ネイルチップ（ショップ）</span>
                </label>
                <label class="p-contact__radio">
                  <input type="radio" name="type" value="other" />
                  <span>その他</span>
                </label>
              </div>
            </div>

            <div class="p-contact__field">
              <label for="message" class="p-contact__label">
                お問い合わせ内容<span class="p-contact__required">必須</span>
              </label>
              <textarea
                id="message"
                name="message"
                class="p-contact__textarea"
                rows="6"
                placeholder="ご希望のデザイン・日程など、お気軽にお書きください"
                required
              ></textarea>
            </div>

            <div class="p-contact__field">
              <label class="p-contact__checkbox">
                <input type="checkbox" name="privacy" required />
                <span><a href="#" class="p-contact__link">プライバシーポリシー</a>に同意する</span>
              </label>
            </div>

            <div class="p-contact__submit">
              <button type="submit" class="c-btn c-btn--gold">送信する</button>
            </div>
          </form>
        </div>
      </section>
    </main>
    {{> p-footer}}
  </body>
</html>
